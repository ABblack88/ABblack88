<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240" style="background: #051424; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; border-radius: 12px; border: 1px solid rgba(0, 240, 255, 0.15);">
  <!-- SVG Styles -->
  <style>
    .glow-cyan {
      filter: drop-shadow(0px 0px 8px rgba(0, 240, 255, 0.6));
    }
    .text-title {
      font-size: 38px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .text-highlight {
      fill: #00f0ff;
    }
    .text-subtitle {
      font-size: 14px;
      fill: #bec6e0;
      letter-spacing: 4px;
    }
    .text-comment {
      fill: #3b494b;
      font-size: 13px;
    }
    .grid-lines {
      stroke: #122131;
      stroke-width: 1;
    }
    .pulse {
      animation: blink 2.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>

  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051424" />
      <stop offset="100%" stop-color="#0d1c2d" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#00dbe9" />
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0d1c2d" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="12" />

  <!-- Accent glow lines -->
  <line x1="0" y1="2" x2="800" y2="2" stroke="url(#cyan-grad)" stroke-width="2" class="glow-cyan" />
  <line x1="0" y1="238" x2="800" y2="238" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.3" />

  <!-- Grid Design Detail -->
  <circle cx="40" cy="120" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="760" cy="120" r="1" fill="#00f0ff" opacity="0.5"/>
  
  <!-- Terminal Frame Top Bar -->
  <g transform="translate(30, 25)">
    <!-- Terminal Dots -->
    <circle cx="10" cy="10" r="6" fill="#ff5f56" />
    <circle cx="28" cy="10" r="6" fill="#ffbd2e" />
    <circle cx="46" cy="10" r="6" fill="#27c93f" />
    <!-- Directory label -->
    <text x="70" y="14" fill="#849495" font-size="11" letter-spacing="1">~ / profile / abblack88</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(40, 75)">
    <!-- Comments line -->
    <text x="0" y="15" class="text-comment" font-family="monospace">&lt;!-- Developer Identity --&gt;</text>
    
    <!-- Title -->
    <text x="0" y="55" class="text-title font-title">
      AUGUSTO <tspan class="text-highlight glow-cyan">BLACK</tspan>
    </text>
    
    <!-- Decorative slash -->
    <text x="350" y="55" fill="#3b494b" font-size="32" font-weight="bold">//</text>

    <!-- Subtitle / Roles -->
    <text x="0" y="85" class="text-subtitle font-title">
      TECHNICAL ARCHITECT <tspan fill="#00f0ff">&amp;</tspan> FULLSTACK DEVELOPER
    </text>
  </g>

  <!-- Status Box (Right Side) -->
  <g transform="translate(540, 85)">
    <!-- Border card -->
    <rect width="220" height="90" rx="8" fill="rgba(18, 33, 49, 0.6)" stroke="#1c2b3c" stroke-width="1.5"/>
    
    <!-- Status Dot -->
    <circle cx="20" cy="25" r="5" fill="#00f0ff" class="pulse" />
    <text x="32" y="29" fill="#00f0ff" font-size="11" font-weight="bold" letter-spacing="1">STATUS: ACTIVE</text>
    
    <text x="18" y="52" fill="#d4e4fa" font-size="11" font-weight="bold" letter-spacing="0.5">LOCATION: LIMA, PE</text>
    <text x="18" y="70" fill="#849495" font-size="11" letter-spacing="0.5">STACK: NEXTJS // NODEJS</text>
  </g>

  <!-- Corner decorations -->
  <path d="M 12,30 L 12,12 L 30,12" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
  <path d="M 788,30 L 788,12 L 770,12" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
  <path d="M 12,210 L 12,228 L 30,228" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
  <path d="M 788,210 L 788,228 L 770,228" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
</svg>
